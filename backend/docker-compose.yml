# Déploiement du BACKEND (EventHub API).
# MongoDB tourne déjà ailleurs (Coolify) -> fourni via MONGODB_URI.
# Coolify gère le reverse-proxy + HTTPS : on n'expose que le port applicatif (pas de mapping host).
services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # Domaine(s) autorisé(s) pour le CORS, séparés par des virgules.
      # Ex: https://eventhub.mondomaine.fr — laisser '*' seulement en test.
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    expose:
      - '3000'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Service one-shot : sync des index (migration) + seed.
  # Ne démarre PAS avec `up` (profile "tools"). À lancer manuellement :
  #   docker compose --profile tools run --rm migrate
  migrate:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    profiles: ['tools']
    restart: 'no'
    command: sh -c "pnpm db:sync && pnpm seed"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-test@eventhub.dev}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-Password123!}
